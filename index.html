<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Jober</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>💼 Jober</h1>

  <div id="jobs"></div>

  <button class="add-btn" onclick="showForm()">+ Добавить</button>

  <div id="form" class="modal">
    <div class="modal-content">
      <h2>Новая вакансия</h2>
      <input id="title" placeholder="Название">
      <input id="salary" placeholder="Зарплата">
      <textarea id="desc" placeholder="Описание"></textarea>
      <button onclick="addJob()">Сохранить</button>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
