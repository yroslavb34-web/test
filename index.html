<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Jober</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>💼 Вакансии</h1>

<div id="jobs"></div>

<button onclick="showForm()">➕ Добавить вакансию</button>

<div id="form" style="display:none;">
  <label for="title">Название:</label><br>
  <input id="title" placeholder="Название"><br>
  <label for="salary">Зарплата:</label><br>
  <input id="salary" placeholder="Зарплата"><br>
  <label for="desc">Описание:</label><br>
  <textarea id="desc" placeholder="Описание"></textarea><br>
  <button onclick="addJob()">Сохранить</button>
  <button onclick="hideForm()">Отмена</button>
</div>

<script src="app.js"></script>
</body>
</html>
